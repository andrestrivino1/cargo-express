---
deployment:
  tasks:
    # La app vive en cargo-express (con guion). public_html es el document root.
    - export APP=/home/tj2yywku2m4d/cargo-express
    - export PUB=/home/tj2yywku2m4d/public_html

    # Symlinks de storage para servir imágenes/documentos (/storage/...) desde el web.
    # Idempotente: -sfn recrea el enlace si ya existe.
    - /bin/ln -sfn $APP/storage/app/public $PUB/storage
    - /bin/ln -sfn $APP/storage/app/public $APP/public/storage

    # Sincronizar assets públicos compilados a public_html.
    - /bin/cp -Rf $APP/public/build $PUB/ 2>/dev/null || true

    # Limpiar cachés de Laravel para que tome el código recién desplegado.
    - /bin/rm -f $APP/bootstrap/cache/config.php $APP/bootstrap/cache/routes-*.php $APP/bootstrap/cache/packages.php $APP/bootstrap/cache/services.php 2>/dev/null || true
